<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Surescripts Gateway</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-card">
        <h2>Surescripts Workbench</h2>
        <div class="button-group">
            <button type="button" class="nav-btn" onclick="showForm('register')">New User</button>
            <button type="button" class="nav-btn" onclick="showForm('login')">Existing User</button>
            <button type="button" class="nav-btn" onclick="handleGuest()">Guest Access</button>
        </div>

        <form id="authForm" class="hidden">
            <h3 id="formActionTitle">Action</h3>
            <div id="extraFields"></div>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="submitBtn">Proceed</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
