<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surescripts Gateway</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>
        // If an active session exists, bypass login immediately
        if (localStorage.getItem('active_session')) {
            window.location.replace('workbench.html');
        }
    </script>

    <div class="auth-card">
        <h2>Surescripts Workbench</h2>
        <p id="formSub">Access the Health Intelligence Network</p>

        <div class="button-group">
            <button type="button" class="nav-btn" onclick="showForm('login')">Login</button>
            <button type="button" class="nav-btn" onclick="showForm('register')">Register</button>
            <button type="button" class="nav-btn" onclick="showForm('guest')">Guest</button>
        </div>

        <form id="authForm" class="hidden">
            <div id="extraFields"></div>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password">
            <button type="submit" id="submitBtn">Enter Workbench</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
