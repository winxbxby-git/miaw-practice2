<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Surescripts Workbench</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: block; padding: 50px;">
    <div class="workbench-container" style="max-width: 800px; margin: auto; background: white; padding: 40px; border-radius: 8px;">
        <h1>Surescripts Workbench</h1>
        <hr>
        <div id="welcomeArea">
            <p>Welcome, <strong id="nameOut"></strong></p>
            <p>Email: <span id="emailOut"></span></p>
        </div>
        <p style="margin-top:20px; color:#666;">You are currently accessing the health intelligence workbench.</p>
        <button onclick="logout()" style="background:#d93025; color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer; margin-top:20px;">Logout</button>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem('active_session'));

        if (!session) {
            window.location.href = 'index.html';
        } else {
            if (session.isGuest) {
                // Display for Guest (No data stored)
                document.getElementById('nameOut').innerText = "Guest User";
                document.getElementById('emailOut').innerText = "None (Anonymous)";
            } else {
                // Display for Registered User
                document.getElementById('nameOut').innerText = session.name;
                document.getElementById('emailOut').innerText = session.email;
            }
        }

        function logout() {
            // Clears session, keeps registry database
            localStorage.removeItem('active_session');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
