<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Surescripts Workbench</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: block; padding: 50px;">
    <div class="workbench-container">
        <h1>Surescripts Workbench</h1>
        <div id="welcomeMessage">
            <p>Welcome, <strong id="userNameDisplay">...</strong></p>
            <p>Email: <span id="userEmailDisplay">...</span></p>
        </div>
        <hr>
        <h3>Workbench Overview</h3>
        <p>This is where your Agentforce instance will be embedded. The agent can now pull your identity directly from the browser session.</p>
        
        <button onclick="logout()" style="background: var(--error); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-top: 20px;">
            Log Out
        </button>
    </div>

    <script>
        // Check if user is actually logged in
        const sessionData = localStorage.getItem('active_session');
        
        if (!sessionData) {
            // No session? Send them back to the gate
            window.location.href = 'index.html';
        } else {
            const user = JSON.parse(sessionData);
            document.getElementById('userNameDisplay').innerText = user.name;
            document.getElementById('userEmailDisplay').innerText = user.email;
        }

        function logout() {
            // ONLY remove the current session. 
            // The 'user_registry' (backend) stays in localStorage forever.
            localStorage.removeItem('active_session');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
