<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Surescripts Workbench</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: block; padding: 40px;">
    <div class="workbench-container" style="max-width: 600px; margin: auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h1>Surescripts Workbench</h1>
        <hr>
        <p>Welcome to the portal.</p>
        <p><strong>Identity:</strong> <span id="userName"></span></p>
        <p><strong>Email:</strong> <span id="userEmail"></span></p>
        
        <button onclick="logout()" style="margin-top: 20px; padding: 10px 20px; background: #d93025; color: white; border: none; border-radius: 4px; cursor: pointer;">
            Log Out
        </button>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem('active_session'));
        
        if (!session) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('userName').innerText = session.name;
            document.getElementById('userEmail').innerText = session.email;
        }

        function logout() {
            // Clears the session but the Registry (Database) stays in the browser
            localStorage.removeItem('active_session');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
