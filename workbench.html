<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surescripts Workbench</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: block; padding: 50px; background-color: #f4f4f9;">

    <div class="workbench-container" style="max-width: 800px; margin: auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h1>Surescripts Workbench</h1>
        <hr>
        
        <div id="welcomeArea">
            <p>Welcome, <strong id="nameOut"></strong></p>
            <p>Email: <span id="emailOut"></span></p>
        </div>

        <div class="content-placeholder" style="margin-top: 30px; padding: 20px; border: 1px dashed #ccc; color: #666;">
            <p>Your workbench tools and data will appear here.</p>
        </div>

        <button onclick="logout()" style="background:#d93025; color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer; margin-top:20px;">
            Logout
        </button>
    </div>

    <script>
        // 1. Session Initialization (Checks if user is logged in)
        const session = JSON.parse(localStorage.getItem('active_session'));

        if (!session) { 
            // Redirect to login if no session exists
            window.location.href = 'index.html'; 
        } else {
            // Display User Info
            document.getElementById('nameOut').innerText = session.isGuest ? "Guest User" : session.name;
            document.getElementById('emailOut').innerText = (session.isGuest || !session.email) ? "Not Provided" : session.email;
        }

        // 2. Simple Logout Function
        function logout() {
            localStorage.removeItem('active_session');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
