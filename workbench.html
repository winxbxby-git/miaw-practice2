<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Surescripts Workbench</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: block; padding: 50px;">
    <div class="workbench-container" style="max-width: 800px; margin: auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h1>Surescripts Workbench</h1>
        <hr>
        <div id="welcomeArea">
            <p>Welcome, <strong id="nameOut"></strong></p>
            <p>Email: <span id="emailOut"></span></p>
        </div>
        <button onclick="logout()" style="background:#d93025; color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer; margin-top:20px;">
            Logout
        </button>
    </div>

    <script>
        // 1. Session Initialization
        const session = JSON.parse(localStorage.getItem('active_session'));
        if (!session) { 
            window.location.href = 'index.html'; 
        } else {
            document.getElementById('nameOut').innerText = session.isGuest ? "Guest User" : session.name;
            document.getElementById('emailOut').innerText = (session.isGuest || !session.email) ? "Not Provided" : session.email;
        }

        // 2. The Salesforce Handshake (BIZAN-9 & BIZAN-11)
        window.addEventListener("onEmbeddedMessagingReady", () => {
            console.log("Handshake Initialized: Communicating with LWC...");

            // BIZAN-9: Always set Environment for routing
            embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({
                "Environment": "Staging" 
            });

            // BIZAN-11: Only auto-fill if we have real user data
            if (session && !session.isGuest && session.email) {
                embeddedservice_bootstrap.prechatAPI.setVisiblePrechatFields({
                    "_firstName": { value: session.name, isEditableByEndUser: false },
                    "_email": { value: session.email, isEditableByEndUser: false }
                });
            }
        });

        function logout() {
            localStorage.removeItem('active_session');
            window.location.href = 'index.html';
        }

        // 3. Salesforce Initialization Function
        function initEmbeddedMessaging() {
            try {
                embeddedservice_bootstrap.settings.language = 'en_US';
                embeddedservice_bootstrap.init(
                    '00DdM00000r3nAn',
                    'Workbench_Channel',
                    'https://orgfarm-0e5a423591-dev-ed.develop.my.site.com/ESWWorkbenchChannel1773392575400',
                    { scrt2URL: 'https://orgfarm-0e5a423591-dev-ed.develop.my.salesforce-scrt.com' }
                );
            } catch (err) {
                console.error('Error loading Embedded Messaging: ', err);
            }
        };
    </script>

    <script type='text/javascript' 
            src='https://orgfarm-0e5a423591-dev-ed.develop.my.site.com/ESWWorkbenchChannel1773392575400/assets/js/bootstrap.min.js' 
            onload='initEmbeddedMessaging()'>
    </script>
</body>
</html>
